<cavs-rt5682.conf>

Define {
	PLAYBACK_PIPELINE_SRC "none"
}

<cavs-mixin-mixout-dax-ctc-ssp.conf>

Object.Base {
	!route [
		{
			source	"dai-copier.SSP.$HEADSET_CODEC_NAME.capture"
			sink	"host-copier.$HEADSET_PCM_ID.capture"
		}
		{
			source	"host-copier.$HEADSET_PCM_ID.playback"
			sink	"gain.1.1"
		}
	]
}
